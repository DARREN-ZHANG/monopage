name = "monopage-api"
main = "src/index.ts"
compatibility_date = "2024-03-16"
account_id = "35badbd60b74b0162ea3897b4bcb80d2"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "KV"
id = "9bff7c888b4f482babc75eba54a87d02"
preview_id = "71a30d44bb424f938853c454f63ea6de"

# Workers AI 绑定
[ai]
binding = "AI"

# 定时任务 - 每天 UTC 06:00 运行
[triggers]
crons = ["0 6 * * *"]

# 环境变量
[vars]
LLM_PROVIDER = "cloudflare"
LLM_MODEL = "@cf/meta/llama-4-scout-17b-16e-instruct"
RATE_LIMIT_PER_HOUR = "100"
LLM_TIMEOUT_MS = "30000"
SCRAPER_TIMEOUT_MS = "15000"
HISTORY_DAYS = "7"

# 开发环境
[env.development]
[env.development.vars]
LLM_PROVIDER = "cloudflare"

# 本地开发配置
[dev]
port = 8787
local_protocol = "http"
